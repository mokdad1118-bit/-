<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الشركة — Adora</title>
  <link rel="stylesheet" href="/tailwind.admin.bundle.css" />
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen p-4">
  <div class="max-w-lg mx-auto space-y-4">
    <h1 class="text-xl font-extrabold text-purple-800">بوابة الشركة — Adora</h1>
    <div id="vp-login-card" class="bg-white rounded-2xl border border-gray-200 p-4 space-y-3">
      <p class="text-sm text-gray-600">تسجيل الدخول باسم المستخدم وكلمة المرور التي استلمتها من الإدارة.</p>
      <input id="vp-user" type="text" class="w-full p-3 rounded-xl border border-gray-200" placeholder="اسم المستخدم" autocomplete="username" />
      <input id="vp-pass" type="password" class="w-full p-3 rounded-xl border border-gray-200" placeholder="كلمة المرور" autocomplete="current-password" />
      <button type="button" id="vp-btn-login" class="w-full py-3 rounded-xl bg-purple-600 text-white font-bold">دخول</button>
      <p id="vp-err" class="text-sm text-red-600 hidden"></p>
    </div>
    <div id="vp-change-card" class="hidden bg-amber-50 rounded-2xl border border-amber-200 p-4 space-y-3">
      <p class="text-sm font-bold text-amber-900">يجب تغيير كلمة المرور قبل المتابعة.</p>
      <input id="vp-new1" type="password" class="w-full p-3 rounded-xl border border-gray-200" placeholder="كلمة المرور الجديدة" />
      <input id="vp-new2" type="password" class="w-full p-3 rounded-xl border border-gray-200" placeholder="تأكيد" />
      <button type="button" id="vp-btn-chpass" class="w-full py-3 rounded-xl bg-amber-600 text-white font-bold">حفظ كلمة المرور</button>
    </div>
    <div id="vp-app" class="hidden space-y-4">
      <div class="flex justify-between items-center">
        <span id="vp-co-name" class="font-bold text-gray-900"></span>
        <button type="button" id="vp-btn-out" class="text-sm text-gray-500 underline">خروج</button>
      </div>
      <p id="vp-quota" class="text-xs text-gray-600"></p>
      <div class="bg-white rounded-2xl border border-gray-200 p-3">
        <h2 class="font-bold mb-2">الطلبات الفرعية</h2>
        <div id="vp-orders" class="space-y-2 text-sm"></div>
      </div>
      <div class="bg-white rounded-2xl border border-gray-200 p-3">
        <h2 class="font-bold mb-2">طلب إعلان / تمييز</h2>
        <select id="vp-ad-type" class="w-full p-2 rounded-xl border border-gray-200 mb-2">
          <option value="general_ad">إعلان عام</option>
          <option value="featured_product">منتج مميز</option>
          <option value="search_boost">ظهور بالبحث</option>
          <option value="home_featured">الصفحة الرئيسية</option>
        </select>
        <textarea id="vp-ad-notes" rows="2" class="w-full p-2 rounded-xl border border-gray-200 text-sm" placeholder="ملاحظات"></textarea>
        <button type="button" id="vp-btn-ad" class="mt-2 w-full py-2 rounded-xl bg-indigo-600 text-white font-bold text-sm">إرسال الطلب</button>
        <div id="vp-ad-list" class="mt-3 space-y-1 text-xs text-gray-600"></div>
      </div>
    </div>
  </div>
  <script src="/vendor-portal.js"></script>
</body>
</html>
