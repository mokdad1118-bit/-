# Render Blueprint: https://render.com/docs/blueprint-spec
# بعد الربط بالمستودع: New Blueprint Instance أو اربط هذا الملف تلقائياً.
# أضف في لوحة Render (Environment):
#   JWT_SECRET      = سلسلة عشوائية طويلة (ليس القيمة الافتراضية)
#   CORS_ORIGIN     = https://موقعك.netlify.app  (بدون / في النهاية)
# ملاحظة: الخطة المجانية تستخدم قرصاً مؤقتاً — قد تُفقد بيانات SQLite عند إعادة التشغيل؛ للإنتاج استخدم Persistent Disk أو قاعدة بيانات خارجية.

services:
  - type: web
    name: adora-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
