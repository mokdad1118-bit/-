# Render Blueprint: https://render.com/docs/blueprint-spec
# New Blueprint → اربط المستودع؛ عند أول إنشاء سيطلب منك قيمة CORS_ORIGIN.
# JWT_SECRET يُولَّد تلقائياً (generateValue).
# إن أنشأت Web Service يدوياً: Build = npm ci، Start = node server.js، Health = /api/health
# ملاحظة: SQLite على الخطة المجانية على قرص مؤقت — للإنتاج استخدم Persistent Disk أو SQLITE_PATH على قرص مثبت.

services:
  - type: web
    name: adora-backend
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
