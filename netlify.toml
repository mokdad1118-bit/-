# نشر واجهة ثابتة — الـ API يعمل على خادم Node منفصل (انظر NETLIFY.md)
# رابط Render يمكن وضعه في: (1) متغير ADORA_API_BASE في Netlify أو (2) ملف render-api-url.txt
[build]
  publish = "."
  command = "npm ci && npm run build && node scripts/write-adora-config.cjs"

# إن احتجت توجيه SPA لاحقاً، يمكن تفعيل السطور التالية بحذر (لا تؤثر على طلبات الـ API لأنها تذهب لنطاق آخر عبر adora-api-base)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
